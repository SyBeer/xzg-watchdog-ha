name: "XZG Watchdog"
description: "Automatyczny watchdog dla bramki Zigbee XZG — restartuje przez HTTP gdy offline"
version: "0.2.0"
slug: "xzg-watchdog"
init: false

arch:
  - aarch64
  - amd64
  - armv7
  - armhf

options:
  xzg_name: "XZG-XXXX"
  xzg_host: "192.168.1.x"
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""
  restart_cooldown_sec: 120
  log_level: "info"

schema:
  xzg_name: str
  xzg_host: str
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_pass: str
  restart_cooldown_sec: int
  log_level: list(trace|debug|info|notice|warning|error|fatal)
